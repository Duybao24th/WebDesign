<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hệ thống quản lý cửa hàng nội thất Long An Decor - Hiện đại, tinh tế và tiện dụng.">
    <title>Long An Decor - Hệ thống quản lý</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F0F9FF] text-[#0C4A6E] font-sans">
    <div id="app" class="flex flex-col min-h-screen">
        <!-- Sidebar will be injected here (Right side drawer) -->
        <aside id="sidebar" class="w-64 bg-[#E0F2FE] border-l border-[#BAE6FD] flex flex-col fixed right-0 top-0 h-screen z-[60] transition-transform translate-x-full shadow-2xl"></aside>

        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[55] hidden"></div>

        <!-- Header (Always visible) -->
        <header class="sticky top-0 h-16 bg-[#E0F2FE]/80 backdrop-blur-md border-b border-[#BAE6FD] flex items-center justify-between px-6 z-50">
            <div class="flex items-center gap-2 overflow-hidden">
                <div class="w-8 h-8 bg-[#0EA5E9] rounded-lg flex items-center justify-center text-white shrink-0">
                    <i data-lucide="leaf" class="w-5 h-5"></i>
                </div>
                <span class="font-serif font-bold text-base sm:text-lg text-[#0EA5E9] truncate">Long An Decor</span>
            </div>
            <button id="mobile-menu-btn" onclick="toggleSidebar()" class="p-2 text-[#64748B] hover:bg-white/50 rounded-lg transition-colors">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-6 lg:p-10 pb-24 lg:pb-10 overflow-y-auto">
            <div id="content" class="max-w-7xl mx-auto">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
        <div id="modal-content" class="bg-white w-full max-w-md rounded-[32px] shadow-2xl overflow-hidden border border-[#BAE6FD]"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
